# docker-compose.prod.yml
# Complete system orchestration for Shadow Litter

version: '3.8'

services:
  # ─── FRONTEND ─────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.shadow-litter.ai
      - NEXT_PUBLIC_WS_URL=wss://api.shadow-litter.ai/ws/live

  # ─── BACKEND ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/shadowlitter
      - REDIS_URL=redis://redis:6379
      - COPERNICUS_USER=${COPERNICUS_USER}
      - COPERNICUS_PASS=${COPERNICUS_PASS}
      - MODEL_PATH=/models/latest
    volumes:
      - model-storage:/models:ro
      - satellite-data:/data/satellite
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  # ─── DATABASE ─────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=shadowlitter
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ─── CACHE & QUEUE ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

volumes:
  model-storage:
  satellite-data:
  postgres-data:
  redis-data:
